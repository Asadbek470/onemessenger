<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Messenger Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="search-box">
                <input type="text" placeholder="Поиск @username..." oninput="searchUsers(this.value)">
                <div id="searchResults"></div>
            </div>
            <div id="chats">
                <div class="chat-item" onclick="selectChat('global')"><b># Общий чат</b></div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <button class="mobile-only" onclick="toggleSidebar()">☰</button>
                <div id="chatTitle">Общий чат</div>
            </header>
            <div class="messages" id="messages"></div>
            <div class="input-row">
                <label class="circle-btn" style="background:#888">📎<input type="file" hidden onchange="uploadFile(this)"></label>
                <input type="text" id="msgInput" placeholder="Сообщение...">
                <button id="voiceBtn" class="circle-btn">🎤</button>
                <button id="videoBtn" class="circle-btn" style="background:#ff4d4d">⭕</button>
                <button id="sendBtn" class="circle-btn">➤</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
