<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Messenger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-title">💬 One Messenger</div>
    <div class="tabs">
      <button id="tabLogin" class="tab active">Вход</button>
      <button id="tabReg" class="tab">Регистрация</button>
    </div>

    <div id="loginPane" class="pane">
      <label>👤 Username</label>
      <input id="loginUser" placeholder="@username" autocomplete="username"/>
      <label>🔒 Пароль</label>
      <input id="loginPass" type="password" placeholder="******" autocomplete="current-password"/>
      <button id="loginBtn" class="primary">➡️ Войти</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="regPane" class="pane hidden">
      <label>👤 Username (a-z 0-9 _ , 4-20)</label>
      <input id="regUser" placeholder="username" autocomplete="username"/>
      <label>🔒 Пароль (6+)</label>
      <input id="regPass" type="password" placeholder="******" autocomplete="new-password"/>
      <button id="regBtn" class="primary">✅ Создать</button>
      <div id="regMsg" class="msg"></div>
    </div>
  </div>

  <!-- 2FA modal -->
  <div id="modal2fa" class="modal hidden">
    <div class="modal-card">
      <div class="modal-title">🔐 Подтверждение входа</div>
      <div class="muted">Код отправлен в личные сообщения от @telegram</div>
      <input id="codeInput" placeholder="6-значный код" maxlength="6" />
      <button id="confirmBtn" class="primary">➡️ Подтвердить</button>
      <button id="cancelBtn" class="ghost">❌ Отмена</button>
      <div id="codeMsg" class="msg"></div>
    </div>
  </div>

<script>
(function(){
  const $ = (id)=>document.getElementById(id);

  const deviceIdKey = "deviceId";
  function getDeviceId(){
    let id = localStorage.getItem(deviceIdKey);
    if(!id){
      id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
      localStorage.setItem(deviceIdKey, id);
    }
    return id;
  }

  function show(pane){
    $("loginPane").classList.toggle("hidden", pane!=="login");
    $("regPane").classList.toggle("hidden", pane!=="reg");
    $("tabLogin").classList.toggle("active", pane==="login");
    $("tabReg").classList.toggle("active", pane==="reg");
  }

  $("tabLogin").onclick=()=>show("login");
  $("tabReg").onclick=()=>show("reg");

  async function api(url, body){
    const r = await fetch(url, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    return r.json();
  }

  let pendingUsername = "";

  $("loginBtn").onclick = async ()=>{
    $("loginMsg").textContent="";
    const identifier = $("loginUser").value.trim();
    const password = $("loginPass").value;
    const deviceId = getDeviceId();
    const deviceName = navigator.userAgent.slice(0,80);

    const data = await api("/api/auth/login", { identifier, password, deviceId, deviceName });
    if(!data.ok){
      $("loginMsg").textContent = "❌ " + data.error;
      return;
    }
    if(data.requireConfirm){
      pendingUsername = data.username;
      $("modal2fa").classList.remove("hidden");
      $("codeMsg").textContent="";
      $("codeInput").value="";
      $("codeInput").focus();
      return;
    }
    localStorage.setItem("token", data.token);
    window.location.href = "/chat.html";
  };

  $("regBtn").onclick = async ()=>{
    $("regMsg").textContent="";
    const username = $("regUser").value.trim().replace(/^@/,'');
    const password = $("regPass").value;
    const data = await api("/api/auth/register", { username, password });
    if(!data.ok){
      $("regMsg").textContent = "❌ " + data.error;
      return;
    }
    $("regMsg").textContent = "✅ Готово! Теперь войди.";
    show("login");
    $("loginUser").value = "@"+username;
    $("loginPass").value = "";
  };

  $("confirmBtn").onclick = async ()=>{
    $("codeMsg").textContent="";
    const code = $("codeInput").value.trim();
    const deviceId = getDeviceId();
    const data = await api("/api/auth/confirm", { username: pendingUsername, code, deviceId });
    if(!data.ok){
      $("codeMsg").textContent = "❌ " + data.error;
      return;
    }
    localStorage.setItem("token", data.token);
    $("modal2fa").classList.add("hidden");
    window.location.href="/chat.html";
  };

  $("cancelBtn").onclick = ()=>{
    $("modal2fa").classList.add("hidden");
  };
})();
</script>
</body>
</html>
