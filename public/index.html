<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>One Messenger | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">OM</div>
      <div>
        <h1>One Messenger</h1>
        <p>Без номера телефона. Вход по @username</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Вход</button>
      <button class="tab" id="tabReg" onclick="switchTab('reg')">Регистрация</button>
    </div>

    <div class="form">
      <label>@username</label>
      <input id="identifier" placeholder="@asadbek000" autocomplete="username" />

      <label>Пароль</label>
      <input id="password" type="password" placeholder="••••" autocomplete="current-password" />

      <button class="btn primary full" onclick="submitAuth()">Продолжить</button>
      <div class="hint">Юзернейм: 4–20 символов (a-z, 0-9, _)</div>
    </div>
  </div>

  <script>
    let mode = "login";
    function switchTab(m){
      mode = m;
      document.getElementById("tabLogin").classList.toggle("active", m==="login");
      document.getElementById("tabReg").classList.toggle("active", m==="reg");
    }

    async function submitAuth(){
      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value.trim();
      if(!identifier || !password) return alert("Заполни поля");

      const url = mode === "login" ? "/api/auth/login" : "/api/auth/register";
      const body = mode === "login"
        ? { identifier, password }
        : { username: identifier, password };

      const r = await fetch(url, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if(!d.ok) return alert(d.error || "Ошибка");

      localStorage.setItem("token", d.token);
      location.href = "chat.html";
    }
  </script>
</body>
</html>
